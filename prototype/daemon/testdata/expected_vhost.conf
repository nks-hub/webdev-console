<VirtualHost *:443>
    ServerName myapp.test
    ServerAlias www.myapp.test
    DocumentRoot "C:\work\sites\myapp\www"

    SSLEngine on
    SSLCertificateFile "C:\certs\myapp.test.crt"
    SSLCertificateKeyFile "C:\certs\myapp.test.key"

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9082"
    </FilesMatch>

    <Directory "C:\work\sites\myapp\www">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "C:\logs\myapp.test-error.log"
    CustomLog "C:\logs\myapp.test-access.log" combined
</VirtualHost>
