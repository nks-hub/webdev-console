appId: com.nks-hub.webdev-console
productName: NKS WebDev Console
copyright: Copyright 2026 NKS Hub

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: resources/daemon
    to: daemon

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  # App needs admin privileges to write hosts file + manage services.
  # Without this each hosts-file change spawns its own UAC prompt. With
  # requireAdministrator the OS prompts once at launch and every child
  # process (daemon, cloudflared, mysql, apache) inherits elevation.
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: NKS WebDev Console
  artifactName: "${productName}-${version}-setup-${arch}.${ext}"

portable:
  artifactName: "${productName}-${version}-portable-${arch}.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Development

publish:
  provider: github
  owner: nks-hub
  repo: webdev-console
  releaseType: release

extraMetadata:
  main: dist-electron/main.js
