appId: com.nks-hub.webdev-console
productName: NKS WebDev Console
copyright: Copyright 2026 NKS Hub

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: resources/daemon
    to: daemon
  # Ship the tray PNGs (and their @2x Retina companions) so the tray
  # loader in electron/main.ts can read them from
  # process.resourcesPath/build/. Without this they stay in buildResources
  # only and the packaged app falls back to the blurry procedural 16×16
  # dot — which is what the user sees as "background noise" on Retina.
  - from: build
    to: build
    filter:
      - "icon-tray-*.png"

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  # App needs admin to edit hosts + manage services without per-op UAC.
  # Single prompt at launch, every child (daemon, cloudflared, mysql,
  # apache) inherits elevation. Smoke test on CI is skipped because
  # headless runners cannot dismiss the UAC dialog.
  requestedExecutionLevel: requireAdministrator

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: NKS WebDev Console
  artifactName: "${productName}-${version}-setup-${arch}.${ext}"

portable:
  artifactName: "${productName}-${version}-portable-${arch}.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # Developer ID Application cert issued 2026-04-23 (HG7R6MG785, expires
  # 2031-04-24). Signing is what makes osascript's `with administrator
  # privileges` dialog offer Touch ID — unsigned apps get the legacy
  # password-only dialog.
  #
  # identity must match a keychain item exactly. electron-builder looks
  # it up by substring, so "Developer ID Application: Jakub Cerny" is
  # enough; we include the team ID so we don't accidentally pick a
  # future cert with the same common name.
  #
  # hardenedRuntime + entitlements are required for notarization (which
  # we don't do yet — no app-specific password configured). They're also
  # harmless without notarization, and turning them on now means a later
  # flip to `notarize: true` only needs two more secrets, no code change.
  # electron-builder expects the name WITHOUT the "Developer ID
  # Application:" prefix — it picks the cert type automatically from
  # the signing mode.
  identity: "Jakub Cerny (DG3SLRLF7A)"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization disabled for now — Apple notary backend was saturated
  # during v0.2.15/v0.2.16 attempts (notarytool --wait hung 60+ min on
  # each run, both cancelled at job timeout). Signing alone is what
  # unlocks Touch ID in osascript admin dialogs, which was the main
  # goal. Notarization (Gatekeeper bypass on other Macs) is a
  # nice-to-have we can flip back on when Apple's queue recovers.
  # Flip to `notarize: true` when ready; secrets APPLE_API_KEY_ID +
  # APPLE_API_ISSUER + APPLE_API_KEY_B64 are already set in the repo.
  notarize: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Development

publish:
  provider: github
  owner: nks-hub
  repo: webdev-console
  releaseType: release

extraMetadata:
  main: dist-electron/main.js
