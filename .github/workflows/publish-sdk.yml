name: Publish Plugin SDK

# F100: pack + push NKS.WebDevConsole.Plugin.SDK to GitHub Packages on
# every `v*` tag pushed to main. Uses the built-in GITHUB_TOKEN so no
# external nuget.org account / API key is required.
#
# Consumer plugins (webdev-console-plugins repo) can then switch their
# csprojs from relative ProjectReference to PackageReference:
#
#   <PackageReference Include="NKS.WebDevConsole.Plugin.SDK" Version="0.1.*" />
#
# after adding the github packages source:
#
#   dotnet nuget add source https://nuget.pkg.github.com/nks-hub/index.json \
#     --name nks-hub --username <user> --password <gh-token>

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.74)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip leading "v" if present so the nupkg ends up as
          # NKS.WebDevConsole.Plugin.SDK.<semver>.nupkg
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing SDK version ${VERSION} (tag ${TAG})"

      # Core packs first — SDK depends on Core via ProjectReference, so
      # the SDK nupkg will carry a dependency entry pointing at the same
      # PackageVersion. Consumer restore needs both packages available
      # in whatever feed they're hitting.
      - name: Restore + build Core
        run: |
          dotnet restore src/daemon/NKS.WebDevConsole.Core/NKS.WebDevConsole.Core.csproj
          dotnet build src/daemon/NKS.WebDevConsole.Core/NKS.WebDevConsole.Core.csproj -c Release --no-restore

      - name: Pack Core
        run: |
          dotnet pack src/daemon/NKS.WebDevConsole.Core/NKS.WebDevConsole.Core.csproj \
            -c Release --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -o out/

      - name: Restore + build SDK
        run: |
          dotnet restore src/daemon/NKS.WebDevConsole.Plugin.SDK/NKS.WebDevConsole.Plugin.SDK.csproj
          dotnet build src/daemon/NKS.WebDevConsole.Plugin.SDK/NKS.WebDevConsole.Plugin.SDK.csproj -c Release --no-restore

      - name: Pack SDK
        run: |
          dotnet pack src/daemon/NKS.WebDevConsole.Plugin.SDK/NKS.WebDevConsole.Plugin.SDK.csproj \
            -c Release --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -o out/

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "out/*.nupkg" \
            --source "https://nuget.pkg.github.com/nks-hub/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

      - name: Upload nupkg as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-sdk-${{ steps.version.outputs.version }}
          path: out/*.nupkg

      # Attach the .nupkg to the GitHub Release tied to this v* tag so
      # consuming repos (webdev-console-plugins) can download the SDK
      # without needing cross-repo GitHub Packages access (task #250:
      # packages-level UI linking). The release is created by build.yml
      # in the same tag push; softprops/action-gh-release upserts assets
      # onto an existing release when one is present.
      # Runs on both tag push (github.ref = refs/tags/v*) and manual
      # workflow_dispatch with a `tag` input. Without the input branch,
      # dispatch-based re-runs checked out main but left the attach step
      # gated by refs/tags/, so Core.nupkg never reached the release —
      # which is exactly how v0.2.0 landed without the Core asset and
      # broke the plugins-repo CI restore (NU1101 NKS.WebDevConsole.Core).
      - name: Attach nupkg to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: out/*.nupkg
          fail_on_unmatched_files: true
