# Dependabot config for the nks-ws monorepo.
#
# Matches the cadence used on catalog-api + plugins repos so all three
# stay roughly in lockstep when a transitive CVE lands in e.g. Node's
# supply chain. Weekly is the lowest cadence Dependabot offers short of
# manual invocation; we don't need bot-driven patches landing daily.
#
# Scope:
#   - github-actions: pins action versions in .github/workflows/*.yml
#   - npm (frontend): Electron/Vue/Vite stack in src/frontend
#   - nuget (daemon): .NET 9 dependency graph
#   - npm (root): scripts/ dev tooling
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Major bumps on upload/download-artifact change Node runtime +
    # hash-mismatch default behaviour. Needs coordinated upgrade with
    # the release.yml + ci.yml steps that consume the artifacts, so
    # auto-PRs on majors just churn the inbox. Patch/minor still land.
    ignore:
      - dependency-name: actions/upload-artifact
        update-types: [version-update:semver-major]
      - dependency-name: actions/download-artifact
        update-types: [version-update:semver-major]
      # v5 switches to Node 24 runtime. Group with the artifact majors
      # above — ship as one Node-24 runner sweep ticket.
      - dependency-name: actions/cache
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: /src/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Ignore major-version bumps on the Electron + packaging stack —
    # those need coordinated code changes and should be manually
    # scheduled via a dedicated sweep ticket, not auto-PR'd in the
    # middle of a sprint.
    ignore:
      - dependency-name: electron
        update-types: [version-update:semver-major]
      - dependency-name: electron-builder
        update-types: [version-update:semver-major]
      - dependency-name: electron-vite
        update-types: [version-update:semver-major]
      - dependency-name: vue
        update-types: [version-update:semver-major]
      - dependency-name: vue-router
        update-types: [version-update:semver-major]
      - dependency-name: pinia
        update-types: [version-update:semver-major]
      # TypeScript 6 + vue-tsc 3 + @vitejs/plugin-vue 6 form a coupled
      # toolchain upgrade — TS 6 changes project references, vue-tsc 3
      # requires Vue 3.5 strict mode, plugin-vue 6 requires Vite 6.
      # Ship as a single sweep ticket, not auto-PRs.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: vue-tsc
        update-types: [version-update:semver-major]
      - dependency-name: "@vitejs/plugin-vue"
        update-types: [version-update:semver-major]

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # coverlet 6→10 skips 4 majors; breaking API changes suspected.
    # Hold until we audit the migration path manually. Microsoft.NET.Test.Sdk
    # 17→18 changes host-process spawning; coupled with coverlet, ship as
    # one test-toolchain sweep. Sentry 4→6 is a breaking SDK migration.
    ignore:
      - dependency-name: coverlet.collector
        update-types: [version-update:semver-major]
      - dependency-name: Microsoft.NET.Test.Sdk
        update-types: [version-update:semver-major]
      - dependency-name: Sentry
        update-types: [version-update:semver-major]
      # .NET runtime packages (System.*, Microsoft.Extensions.*) jumping
      # major (9→10) implies a TargetFramework move to .NET 10. Ship as
      # a coordinated platform upgrade ticket, not a drive-by bump.
      - dependency-name: System.Security.Cryptography.ProtectedData
        update-types: [version-update:semver-major]
